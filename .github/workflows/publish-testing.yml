name: Publish Testing

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or SHA to publish
        required: true
        default: main
        type: string
      release_type:
        description: Version bump used for the testing build
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish-testing:
    uses: XelsPlugins/XelsDalamudRepo/.github/workflows/plugin-publish-testing.yml@main
    with:
      plugin_project_path: XelsTweaks/XelsTweaks.csproj
      feed_repo: XelsPlugins/XelsDalamudRepo
      source_ref: ${{ inputs.source_ref }}
      release_type: ${{ inputs.release_type }}
      dotnet_version: 10.0.x
      internal_name: XelsTweaks
    secrets:
      feed_token: ${{ secrets.XELS_DALAMUD_FEED_TOKEN }}
